<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Hub</title>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #16171d; 
      color: #f3f4f6;
      margin: 0;
    }
    h3 { margin: 0 0 12px 0; font-size: 16px; color: #fff; border-bottom: 1px solid #2e303a; padding-bottom: 8px; }
    .status-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 13px; }
    .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge.active { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.4); }
    .badge.inactive { background: rgba(156, 163, 175, 0.2); color: #9ca3af; border: 1px solid rgba(156, 163, 175, 0.4); }
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #aa3bff; color: white; }
    .btn-primary:hover { background: #9326e6; }
    .btn-secondary { background: #2e303a; color: #f3f4f6; border: 1px solid #4b5563; }
    .btn-secondary:hover { background: #3f4251; }
  </style>
</head>
<body>
  <h3>Interceptor Control Hub</h3>
  
  <div class="status-container">
    <span>Current Tab Status:</span>
    <span id="tab-status" class="badge inactive">Checking...</span>
  </div>

  <button id="lock-tab-btn" class="btn-primary">🔒 Lock & Hook Current Tab</button>
  
  <script type="module" src="/src/core/popup.ts"></script>
</body>
</html>
